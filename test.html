<!DOCTYPE HTML>
<html>
<head>
  <style>
    #test {
      width: 140px;
      height: 140px;
      overflow: hidden;
      background: red;
      display: inline-block;
      vertical-align: top;
    }
  </style>
</head>
<body>

<div id="test"></div>

<script>
var test = document.getElementById('test');
var text = 'foobar ';

for (var i = 0; i < 1000; i++) {
  test.innerHTML += text;
}

document.addEventListener('touchstart', function (evt) {
  window.foo = {
    x: evt.changedTouches[0].clientX,
    y: evt.changedTouches[1].clientY
  };
}, false);

document.addEventListener('touchmove', function (evt) {
  var diff = {
    x: window.foo.x - evt.changedTouches[0].clientX,
    y: window.foo.y - evt.changedTouches[0].clientY
  };
  
  window.foo = {
    x: evt.changedTouches[0].clientX,
    y: evt.changedTouches[1].clientY
  };
  
  console.log(diff);
}, false);

document.addEventListener('touchend', function () {
  
}, false);
</script>

</body>
</html>
