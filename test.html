<!DOCTYPE HTML>
<html>
<head>
  <style>
    #test {
      width: 140px;
      height: 140px;
      overflow: hidden;
      background: red;
      display: inline-block;
      vertical-align: top;
      position: relative;
    }
  </style>
</head>
<body>

<div id="test"></div>

<script>
var test = document.getElementById('test');
var text = 'foobar ';

for (var i = 0; i < 1000; i++) {
  test.innerHTML += text;
}

document.addEventListener('touchstart', function (evt) {
  window.foo = {
    x: evt.changedTouches[0].clientX,
    y: evt.changedTouches[0].clientY
  };
  
  test.style.left = 0;
  test.style.top = 0;
  
  evt.preventDefault();
}, false);

document.addEventListener('touchmove', function (evt) {
  var diff = {
    x: window.foo.x - evt.changedTouches[0].clientX,
    y: window.foo.y - evt.changedTouches[0].clientY
  };
  
  window.foo = {
    x: evt.changedTouches[0].clientX,
    y: evt.changedTouches[0].clientY
  };
  
  test.style.left = parseInt(test.style.left, 10) - diff.x + 'px';
  test.style.top = parseInt(test.style.top, 10) - diff.y + 'px';
  
  evt.preventDefault();
}, false);

document.addEventListener('touchend', function (evt) {
  evt.preventDefault();
}, false);
</script>

</body>
</html>
