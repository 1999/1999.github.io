<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Language" content="ru">

    <link rel="stylesheet" href="./css/reset.css" media="all">

    <title>Тестовая страница для авторизации кинохостинга</title>
</head>
<body>

<script type="application/javascript">
var CLIENT_ID = 'c036522e28134334adf7a182952b9350';

var token = /access_token=([0-9a-f]+)/.exec(document.location.hash);
var error = /error_description=([^&]+)/.exec(document.location.hash);
var retpath = /retpath=([^&]+)/.exec(document.location.search);
var state = /state=([^&]+)/.exec(document.location.hash);

if (token) {
  alert('Token received: ' + token[1]);
  alert('Save token into hosting database...');
  alert('Generate token for KP...');

  var retPath = decodeURIComponent(state[1]);
  location.href = retPath + '#access_token=' + Math.random();
} else if (error) {
  alert('Error: ' + error[1]);
  location.href = retPath + '#error=' + error[1];
} else {
  location.href = 'https://oauth.yandex.ru/authorize?response_type=token&client_id=' + CLIENT_ID + '&display=popup&state=' + retpath[1];
}
</script>

</body>
</html>
