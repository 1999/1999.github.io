<!DOCTYPE HTML>
<html>
<head>
  <style>
    #test {
      width: 140px;
      height: 140px;
      overflow: hidden;
      background: red;
      display: inline-block;
      vertical-align: top;
      position: relative;
      transition: all .05s linear;
    }
  </style>
</head>
<body>

<div id="test"></div>

<script>
var test = document.getElementById('test');

document.addEventListener('touchstart', function (evt) {
  window.foo = {
    x: evt.changedTouches[0].clientX,
    y: evt.changedTouches[0].clientY
  };

  test.style.webkitTransform = 'translate(' + (evt.changedTouches[0].clientX - 70) + 'px, ' + (evt.changedTouches[0].clientY - 70) + 'px)';
  test.dataset.x = evt.changedTouches[0].clientX - 70;
  test.dataset.y = evt.changedTouches[0].clientY - 70;

  evt.preventDefault();
}, false);

document.addEventListener('touchmove', function (evt) {
  var diff = {
    x: window.foo.x - evt.changedTouches[0].clientX,
    y: window.foo.y - evt.changedTouches[0].clientY
  };

  window.foo = {
    x: evt.changedTouches[0].clientX,
    y: evt.changedTouches[0].clientY
  };

  test.style.webkitTransform = 'translate(' + (parseInt(test.dataset.x, 10) - diff.x) + 'px, ' + (parseInt(test.dataset.y, 10) - diff.y) + 'px)';
  test.dataset.x = window.foo.x;
  test.dataset.y = window.foo.y;

  evt.preventDefault();
}, false);

document.addEventListener('touchend', function (evt) {
  evt.preventDefault();
}, false);
</script>

</body>
</html>
