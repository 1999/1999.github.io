    <script type="text/javascript">
    $(document).ready(function () {
        var gistsArea = $("#gists");
        var clientId = "d7069920699909265b05";
        var secret = "9f046115f10fb7cdc8b7da4a924a826c86332d60";

        var parseQuery = function () {
            var args = location.search.substring(1).split('&');
            var argsParsed = {};
            var sprtPos;

            for (var i = 0; i < args.length; i++) {
                args[i] = decodeURI(args[i]).trim();
                sprtPos = args[i].indexOf("=");

                if (sprtPos === -1) {
                    argsParsed[args[i]] = true;
                } else {
                    argsParsed[args[i].substr(0, sprtPos)] = args[i].substr(sprtPos + 1);
                }
            }

            return argsParsed;
        };
    
        if (!window.sessionStorage)
            return gistsArea.html("Your browser doesn't support session storage API.");

        var query = parseQuery();
        if (!sessionStorage.token && !query.code)
            return gistsArea.html("<a href='https://github.com/login/oauth/authorize?client_id=" + clientId + "&scope=gist'>Provide access to github API via OAuth</a>");

        if (query.code) {
            var client = $("<input name='client_id'>").val(clientId);
            var secret = $("<input name='client_secret'>").val(secret);
            var code = $("<input name='code'>").val(query.code);
            $("<form action='https://github.com/login/oauth/access_token' method='post'>").append(client, secret, code).submit();
        }

        // console.log(window.location)
    });    
    </script>
