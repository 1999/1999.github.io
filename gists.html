    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.0/jquery.min.js"></script>
    <script type="text/javascript">
    $(document).ready(function () {
        var gistsArea = $("#gists");
        var clientId = "d7069920699909265b05";
        var secret = "9f046115f10fb7cdc8b7da4a924a826c86332d60";

        var parseQuery = function () {
            var args = location.search.substring(1).split('&');
            var argsParsed = {};
            var sprtPos;

            for (var i = 0; i < args.length; i++) {
                args[i] = decodeURI(args[i]).trim();
                sprtPos = args[i].indexOf("=");

                if (sprtPos === -1) {
                    argsParsed[args[i]] = true;
                } else {
                    argsParsed[args[i].substr(0, sprtPos)] = args[i].substr(sprtPos + 1);
                }
            }

            return argsParsed;
        };
    
        if (!window.sessionStorage)
            return gistsArea.html("Your browser doesn't support session storage API.");

        var query = parseQuery();
        if (!sessionStorage.token && !query.code)
            return gistsArea.html("<a href='https://github.com/login/oauth/authorize?client_id=" + clientId + "&scope=gist'>Provide access to github API via OAuth</a>");

        if (query.code) {
            var cli = 'curl -i https://github.com/login/oauth/access_token -H "Origin: http://staypositive.ru" -H "Accept: application/json" --data "client_id=d7069920699909265b05&client_secret=9f046115f10fb7cdc8b7da4a924a826c86332d60&code=' + query.code + '"';
            console.log(cli);

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "https://github.com/login/oauth/access_token", true);
            xhr.withCredentials = true;

            xhr.setRequestHeader('X-PINGOTHER', 'pingpong');
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');

            // dataType: json with contentType: 'application/x-www-form-urlencoded'

            xhr.onreadystatechange = function () {
                console.log([xhr.readyState, xhr.status, xhr.responseText]);
            };

            var data = new FormData;
            data.append("client_id", clientId);
            data.append("client_secret", secret);
            data.append("code", query.code);
            xhr.send(data);

            $.ajax({
                type: "POST",
                url: "https://github.com/login/oauth/access_token",
                data: {
                    client_id: clientId,
                    client_secret: secret,
                    code: query.code
                },
                success: function (json) {
                    console.log(json);
                },
                crossDomain: true,
                contentType: "application/json",
                xhrFields: {
                    withCredentials: true
                }
            });
        }

        // /gists
        // http://developer.github.com/v3/gists/#response

        // console.log(window.location)
    });
